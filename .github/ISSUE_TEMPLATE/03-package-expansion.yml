name: Package Expansion Request
description: Request a branched/expanded package or plugin split from the core skill stack.
title: "[Package Expansion] "
labels: ["kind:package-expansion", "status:needs-triage", "area:packaging"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose additional packages, plugin splits, or distribution variants.
  - type: input
    id: package-name
    attributes:
      label: Proposed package name
      placeholder: "ex: kde-plasma-agentic-os-skill-obs"
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case and audience
      description: Who needs this package and why?
    validations:
      required: true
  - type: textarea
    id: included-features
    attributes:
      label: Included features
      description: What should be included vs kept in core?
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility/constraints
      description: KDE versions, distro constraints, security boundaries, maintenance scope.
    validations:
      required: true
