name: Bug Report
description: Report a reproducible bug in the skill stack, CLI, or endpoint API.
title: "[Bug] "
labels: ["kind:bug", "status:needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands and endpoint calls when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "KDE Plasma version, distro, Python version"
    validations:
      required: true
