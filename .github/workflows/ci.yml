name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: CLI smoke test
        run: |
          kde-plasma-skill --help
          kde-plasma-skill doctor --json || true
      - name: Build package artifacts
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Compile bundled scripts
        run: |
          python -m py_compile src/kde_plasma_agentic_os_installer/cli.py
          python -m py_compile src/kde_plasma_agentic_os_installer/skill_bundle/kde-plasma-agentic-os/scripts/*.py
