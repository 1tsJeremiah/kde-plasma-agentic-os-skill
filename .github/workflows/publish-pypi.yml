name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Validate version matches tag
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          import pathlib
          import tomllib
          import os
          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag/version mismatch: tag={tag} expected={expected}")
          print(f"Tag/version OK: {tag}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publisher)
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/kde-plasma-agentic-os-skill
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
